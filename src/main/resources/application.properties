spring.application.name=LiteraturaChallenge
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/literatura}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.gutendex.base-url=${APP_GUTENDEX_BASE_URL:https://gutendex.com/books}
app.stats.languages=${APP_STATS_LANGUAGES:es,en,pt}
